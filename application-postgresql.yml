                    driverClassName: 'org.postgresql.Driver'
                    jdbcUrl: 'jdbc:postgresql://<HOST>:<PORT>/template_springboot_mvc_main_1'
                    username: '<USERNAME>'
                    password: '<PASSWORD>'
