config:    
    #
    # TRX MANAGER
    #
    trxManager:
        primary:
            datasource:
                hikari:
                    driverClassName: 'org.postgresql.Driver'
                    jdbcUrl: 'jdbc:postgresql://<HOST>:<PORT>/template_springboot_mvc_main_1'
                    username: '<USERNAME>'
                    password: '<PASSWORD>'
                agroal:
                    jdbcUrl: 'jdbc:postgresql://<HOST>:<PORT>/template_springboot_mvc_main_1'
                    username: '<USERNAME>'
                    password: '<PASSWORD>'
